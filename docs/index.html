<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>有色金属每日价格看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:18px;white-space:nowrap}
.header .updated{color:#64748b;font-size:12px;margin-left:auto}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.controls select{padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;cursor:pointer}
.card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:14px}
.card h3{font-size:14px;font-weight:600;margin-bottom:8px;color:#334155}

/* ===== 分区系统 ===== */
.section{margin-bottom:16px}
.section-label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#64748b;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.section-label .bar{width:3px;height:14px;border-radius:2px}
.section-label.daily .bar{background:#2563eb}
.section-label.monthly .bar{background:#ea580c}
.section-label.trend .bar{background:#9333ea}
.section-divider{border:none;border-top:1px dashed #cbd5e1;margin:20px 0 4px}
/* 分区卡片左边框色 */
.section.daily .card{border-left:3px solid #2563eb}
.section.monthly .card{border-left:3px solid #ea580c}
.section.trend .card{border-left:3px solid #9333ea}
/* 分区 badge 颜色 */
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-left:4px}
.badge-daily{background:#dbeafe;color:#1d4ed8}
.badge-monthly{background:#ffedd5;color:#c2410c}
.badge-trend{background:#f3e8ff;color:#7e22ce}
.badge-cross{background:#fef3c7;color:#a16207}
.badge-predict{background:#ede9fe;color:#6d28d9}

.chart-wrap{position:relative;height:240px}
.chart-wrap.annual{height:300px}
.chart-wrap.compact{height:200px}

/* 横拉表 */
.table-wrap{overflow-x:auto;margin-top:4px;-webkit-overflow-scrolling:touch}
.table-wrap table{border-collapse:collapse;font-size:12px;white-space:nowrap;min-width:100%}
.table-wrap th,.table-wrap td{padding:5px 8px;border:1px solid #e2e8f0;text-align:center}
.table-wrap thead th{background:#f8fafc;position:sticky;top:0;z-index:2;font-weight:600}
.table-wrap tbody td{min-width:60px}
.table-wrap .sticky-col{position:sticky;left:0;background:#f8fafc;z-index:1;text-align:left;font-weight:600;min-width:90px}
.table-wrap thead .sticky-col{z-index:3}
.table-wrap .cat-row td{background:#e2e8f0;font-weight:700;text-align:left;font-size:12px;padding:3px 8px;position:sticky;left:0;z-index:1}
.table-wrap .cat-row td:first-child{z-index:3}
.no-data{color:#94a3b8}
.avg-col{background:#fefce8;font-weight:600}
/* 月均价列冻结右侧 */
.table-wrap td.sticky-right,.table-wrap th.sticky-right{position:sticky;right:0;z-index:1}
.table-wrap thead th.sticky-right{z-index:3}
.no-data{color:#94a3b8}
/* 今日列绿色高亮 */
.table-wrap td.today-col{background:#dcfce7;font-weight:600;color:#14532d}
.table-wrap thead th.today-col{background:#bbf7d0;color:#14532d}
/* 最新一天蓝色高亮（年度趋势等场景） */
.table-wrap td.latest-day{background:#dbeafe;font-weight:700;color:#1e40af}
.table-wrap thead th.latest-day{background:#bfdbfe;color:#1e3a8a}
.unit-tag{font-size:10px;color:#94a3b8;margin-left:2px}

/* ===== KPI 摘要行 ===== */
.kpi-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:150px;background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:3px solid #2563eb}
.kpi-card .kpi-label{font-size:11px;color:#64748b;margin-bottom:4px}
.kpi-card .kpi-value{font-size:22px;font-weight:700;color:#1e293b;line-height:1.2}
.kpi-card .kpi-value .unit{font-size:11px;font-weight:400;color:#94a3b8;margin-left:2px}
.kpi-card .kpi-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.kpi-change{font-size:13px;font-weight:600;margin-left:6px}
.kpi-up{color:#dc2626}
.kpi-down{color:#16a34a}
.kpi-card.accent-cu{border-left-color:#0891b2}
.kpi-card.accent-al{border-left-color:#2563eb}
.kpi-card.accent-adc{border-left-color:#ea580c}
.kpi-card.accent-mom{border-left-color:#9333ea}

/* ===== 双列图表 ===== */
.dual-charts{display:flex;gap:14px;flex-wrap:wrap}
.dual-charts .card{flex:1;min-width:300px;margin-bottom:14px}
/* 日趋势 2×2 网格 */
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.trend-grid{grid-template-columns:1fr}}

/* ===== 月度均价明细表 ===== */
.avg-table-wrap{overflow-x:auto;margin-top:4px;-webkit-overflow-scrolling:touch}
.avg-table-wrap table{border-collapse:collapse;font-size:12px;white-space:nowrap;min-width:100%}
.avg-table-wrap th,.avg-table-wrap td{padding:6px 10px;border:1px solid #e2e8f0;text-align:center}
.avg-table-wrap thead th{background:#f1f5f9;font-weight:600;position:sticky;top:0;z-index:2}
.avg-table-wrap .sticky-col{position:sticky;left:0;background:#fff;z-index:1;text-align:left;font-weight:600;min-width:100px}
.avg-table-wrap thead .sticky-col{z-index:3;background:#f1f5f9}
.avg-table-wrap .cat-row td{background:#e0e7ff;font-weight:700;text-align:left;font-size:11px;padding:3px 10px;position:sticky;left:0;z-index:1}
.avg-table-wrap .cat-row td:first-child{z-index:3}
.avg-table-wrap .latest-month{background:#fef3c7;font-weight:600}
.avg-table-wrap .chg-up{color:#dc2626;font-weight:600}
.avg-table-wrap .chg-down{color:#16a34a;font-weight:600}
.avg-table-wrap .chg-flat{color:#94a3b8}
.avg-table-wrap .unit-tag{font-size:10px;color:#94a3b8;margin-left:2px}

/* ===== 预测置信区间标签 ===== */
.prediction-note{font-size:11px;color:#64748b;margin-top:6px;line-height:1.5}
.prediction-note .ci-band{display:inline-block;width:12px;height:8px;background:rgba(147,51,234,.2);border:1px dashed #9333ea;border-radius:2px;vertical-align:middle;margin:0 2px}

/* ===== 可折叠区块 ===== */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.collapsible-header h3{margin:0}
.toggle-icon{font-size:12px;color:#64748b;font-weight:400;transition:transform .2s}
.toggle-icon.expanded{transform:rotate(0deg)}
.collapsible-body{overflow:hidden;transition:max-height .3s ease}

/* ===== 导出按钮 ===== */
.export-wrap{position:relative;display:inline-block}
.export-toggle{padding:5px 14px;border:1px solid #cbd5e1;border-radius:7px;font-size:12px;background:#fff;color:#334155;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.export-toggle:hover{background:#f8fafc;border-color:#94a3b8}
.export-toggle svg{flex-shrink:0}
.export-menu{position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:4px;min-width:150px;display:none;z-index:100}
.export-menu.open{display:block}
.export-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13px;color:#334155;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s}
.export-menu-item:hover{background:#f1f5f9}
.export-menu-item svg{color:#64748b;flex-shrink:0}

@media (max-width:768px){
  body{padding:8px}
  .card{padding:10px}
  .chart-wrap{height:200px}
  .kpi-card{min-width:120px}
  .kpi-card .kpi-value{font-size:18px}
  .dual-charts{flex-direction:column}
}
</style>

<!-- Print 样式：PDF 导出时隐藏控件，只保留表格和图表 -->
<style>
@media print {
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .header, .controls, .export-wrap, .section-label, .section-divider,
  .collapsible-header .toggle-icon { display: none !important; }
  .collapsible-body { display: block !important; max-height: none !important; }
  .card { box-shadow: none; border: 1px solid #e2e8f0; break-inside: avoid; page-break-inside: avoid; }
  .chart-wrap, .chart-wrap.compact, .chart-wrap.annual { height: 180px !important; }
  .kpi-card { box-shadow: none; border: 1px solid #e2e8f0; }
  .table-wrap { overflow: visible; max-height: none; }
  .trend-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 有色金属每日价格看板</h1>
  <span class="updated" id="updatedTime">加载中...</span>
  <a href="editor.html?v=2" style="color:#fff;background:#1a73e8;padding:4px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:500;margin-left:12px">编辑数据</a>
</div>

<div class="controls">
  <select id="yearSelect" onchange="switchMonth()"></select>
  <select id="monthSelect" onchange="switchMonth()"></select>
  <div style="margin-left:auto">
    <div class="export-wrap">
      <button class="export-toggle" onclick="toggleExportMenu(event)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        导出
      </button>
      <div class="export-menu" id="exportMenu">
        <button class="export-menu-item" onclick="exportExcel();closeExportMenu()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Excel (.csv)
        </button>
        <button class="export-menu-item" onclick="exportPDF();closeExportMenu()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l3 3 3-3"/></svg>
          PDF (打印)
        </button>
        <button class="export-menu-item" onclick="exportMarkdown();closeExportMenu()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Markdown (.md)
        </button>
      </div>
    </div>
  </div>
</div>

<!-- KPI 摘要行 -->
<div class="kpi-row" id="kpiRow"></div>

<!-- ===== 日维度 ===== -->
<div class="section daily">
  <div class="section-label daily"><span class="bar"></span>日维度</div>

  <div class="card">
    <h3>📋 日价格明细表 <span class="badge badge-daily">每日</span> <span style="font-size:11px;color:#94a3b8;margin-left:auto;float:right">← 左右横拉 →</span></h3>
    <div class="table-wrap" id="tableContainer"></div>
  </div>

  <div class="trend-grid" id="dailyTrends"></div>
</div>

<hr class="section-divider">

<!-- ===== 月维度 ===== -->
<div class="section monthly">
  <div class="section-label monthly"><span class="bar"></span>月维度</div>

  <div class="card">
    <div class="collapsible-header" onclick="toggleAvgTable()">
      <h3>📋 月度均价明细表 <span class="badge badge-monthly">月度</span> <span class="badge badge-cross">含环比</span></h3>
      <span class="toggle-icon" id="avgToggleIcon">▶ 点击展开</span>
    </div>
    <div class="collapsible-body" id="avgTableBody" style="display:none">
      <div class="avg-table-wrap" id="avgTableContainer"></div>
    </div>
  </div>

  <div class="card">
    <h3>📈 月度均价趋势对比 <span class="badge badge-monthly">跨月</span></h3>
    <div style="margin-bottom:8px">
      <select id="avgTrendCategory" onchange="renderMonthlyAvgComparison()" style="padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;cursor:pointer"></select>
    </div>
    <div class="chart-wrap" style="height:300px"><canvas id="avgTrendChart"></canvas></div>
  </div>

  <div class="dual-charts">
    <div class="card">
      <h3>📊 月度波动趋势 <span class="badge badge-monthly">区间</span></h3>
      <div style="margin-bottom:8px">
        <select id="volCategory" onchange="renderVolatilityTrend()" style="padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;cursor:pointer"></select>
      </div>
      <div class="chart-wrap compact" style="height:280px"><canvas id="volatilityChart"></canvas></div>
    </div>
    <div class="card">
      <h3>🔮 下月价格预测 <span class="badge badge-predict">预测</span></h3>
      <div style="margin-bottom:8px">
        <select id="predVariety" onchange="renderPrediction()" style="padding:4px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;background:#fff;cursor:pointer"></select>
      </div>
      <div class="chart-wrap compact" style="height:280px"><canvas id="predictionChart"></canvas></div>
      <div class="prediction-note" id="predictionNote"></div>
    </div>
  </div>
</div>


<script>
// ===== DATA =====
let ALL_DATA = {};
const VARIETY_NAMES = {"ADC12": "ADC12", "A380": "A380", "AlSi9Cu3": "AlSi9Cu3", "A356": "A356", "A00_AL": "A00铝", "CU": "铜", "SI_441": "硅441", "SI_3303": "硅3303", "SI_331": "硅331", "MG": "镁", "MN": "电解锰", "Wenxi_MG": "闻喜镁锭", "AM60B": "AM60B", "AZ91D": "AZ91D", "W": "钨粉", "WTI": "WTI原油"};
const VARIETY_UNITS = {"W": "元/千克", "WTI": "USD/bbl"};
const CATEGORIES = [{"name": "铝及铝合金", "codes": ["ADC12", "A380", "AlSi9Cu3", "A356", "A00_AL"]}, {"name": "铜硅镁锰", "codes": ["CU", "SI_441", "SI_3303", "SI_331", "MG", "MN"]}, {"name": "镁合金", "codes": ["Wenxi_MG", "AM60B", "AZ91D"]}, {"name": "钨粉及原油", "codes": ["W", "WTI"]}];
const COLORS = ["#2563eb", "#dc2626", "#16a34a", "#ca8a04", "#9333ea", "#0891b2", "#ea580c", "#4f46e5", "#be123c", "#0d9488", "#d97706", "#7c3aed"];
const CHART_IDS = [];

const DEFAULT_UNIT = "元/吨";

// ===== SELECTOR =====
function initSelectors() {
  const months = Object.keys(ALL_DATA).map(d => d.substring(0,7));
  const uniqueMonths = [...new Set(months)].sort();
  const years = [...new Set(uniqueMonths.map(m => m.substring(0,4)))].sort();
  
  const ys = document.getElementById("yearSelect");
  const ms = document.getElementById("monthSelect");
  ys.innerHTML = years.map(y => `<option value="${y}">${y}年</option>`).join("");
  
  if(uniqueMonths.length > 0) {
    const [ly, lm] = uniqueMonths[uniqueMonths.length-1].split("-");
    ys.value = ly;
    updateMonthOptions(ly, lm);
  }
}

function updateMonthOptions(year, selectedMonth) {
  const ms = document.getElementById("monthSelect");
  const mm = ALL_DATA ? Object.keys(ALL_DATA)
    .filter(d => d.startsWith(year))
    .map(d => d.substring(5,7))
    .filter((v,i,a) => a.indexOf(v)===i)
    .sort() : [];
  ms.innerHTML = mm.map(m => `<option value="${m}">${m}月</option>`).join("");
  if(selectedMonth && mm.includes(selectedMonth)) ms.value = selectedMonth;
  else if(mm.length > 0) ms.value = mm[mm.length-1];
}

function switchMonth() {
  const y = document.getElementById("yearSelect").value;
  const prevMonth = document.getElementById("monthSelect").value;
  updateMonthOptions(y, prevMonth);
  const m = document.getElementById("monthSelect").value;
  renderAll(y, parseInt(m));
}

function getSelected() {
  return {
    year: parseInt(document.getElementById("yearSelect").value),
    month: parseInt(document.getElementById("monthSelect").value)
  };
}

// ===== RENDER =====
function renderAll(year, month) {
  destroyCharts();
  const dailyContainer = document.getElementById("dailyTrends");
  dailyContainer.innerHTML = "";

  renderKPIs(year, month);
  renderMonthlyAvgTable(year);
  renderTable(year, month);
  renderMonthlyTrends(dailyContainer, year, month);
  renderMonthlyAvgComparison();
  renderVolatilityTrend();
  renderPrediction();
}

// 月度日趋势图
function renderMonthlyTrends(container, year, month) {
  const days = getMonthDays(year, month).filter(d => isWorkingDay(d));
  const labels = days.map(d => d.getDate());
  
  CATEGORIES.forEach(cat => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.marginBottom = "0";
    const cid = "chart-" + Math.random().toString(36).substr(2,6);
    card.innerHTML = `<h3>📈 ${cat.name} <span class="badge badge-daily">日趋势</span></h3><div class="chart-wrap compact"><canvas id="${cid}"></canvas></div>`;
    container.appendChild(card);
    
    const datasets = cat.codes.map((code, i) => {
      const points = days.map(d => {
        const ds = formatDateLocal(d);
        const prices = ALL_DATA[ds];
        return prices && prices[code] != null ? prices[code] : null;
      });
      const unit = VARIETY_UNITS[code] || DEFAULT_UNIT;
      return {
        label: VARIETY_NAMES[code] + " (" + unit + ")",
        data: points,
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: "transparent",
        tension: 0.3,
        pointRadius: 2,
        pointHoverRadius: 5,
        spanGaps: false,
      };
    }).filter(ds => ds.data.some(v => v !== null));
    
    if(datasets.length > 0) {
      new Chart(document.getElementById(cid), {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { tooltip: { mode: "index", intersect: false } },
          scales: {
            x: { title: { display: true, text: "日期" } },
            y: { title: { display: true, text: "价格" }, beginAtZero: false }
          }
        }
      });
    } else {
      card.innerHTML += '<p class="no-data">本月暂无数据</p>';
    }
  });
}

// 月度横拉表
function renderTable(year, month) {
  const container = document.getElementById("tableContainer");
  const prefix = `${year}-${String(month).padStart(2,"0")}`;
  const days = getMonthDays(year, month);
  const allCodes = CATEGORIES.flatMap(c => c.codes);
  
  // 收集该月工作日（有数据）
  const activeDays = days.filter(d => {
    if (!isWorkingDay(d)) return false;
    const ds = formatDateLocal(d);
    return ALL_DATA[ds] && Object.values(ALL_DATA[ds]).some(v => v !== null);
  });
  
  if(activeDays.length === 0) {
    container.innerHTML = '<p class="no-data" style="padding:20px">该月份暂无数据</p>';
    return;
  }
  
  const lastIdx = activeDays.length - 1;
  // 标记"今天"的列索引（用于高亮）
  const todayStr = new Date().toISOString().substring(0, 10);
  const todayIdx = activeDays.findIndex(d => formatDateLocal(d) === todayStr);
  
  let html = '<table><thead><tr><th class="sticky-col">品种</th>';
  activeDays.forEach((d, i) => {
    const isToday = i === todayIdx;
    const cls = isToday ? ' class="today-col"' : '';
    html += `<th${cls}>${d.getMonth()+1}/${d.getDate()}${isToday ? '<br><span style="font-size:9px;font-weight:700">今日</span>' : ''}</th>`;
  });
  html += '<th class="avg-col sticky-right">月均价</th></tr></thead><tbody>';
  
  CATEGORIES.forEach(cat => {
    // 分类行
    html += `<tr class="cat-row"><td colspan="${activeDays.length+2}">${cat.name}</td></tr>`;
    cat.codes.forEach(code => {
      html += `<tr><td class="sticky-col">${VARIETY_NAMES[code]}<span class="unit-tag">${VARIETY_UNITS[code] || DEFAULT_UNIT}</span></td>`;
      let sum=0, cnt=0;
      activeDays.forEach((d, i) => {
        const ds = formatDateLocal(d);
        const v = ALL_DATA[ds] && ALL_DATA[ds][code] != null ? ALL_DATA[ds][code] : null;
        const isToday = i === todayIdx;
        if(v != null) { sum += v; cnt++; html += `<td${isToday ? ' class="today-col"' : ''}>${Number.isInteger(v) ? v : v.toFixed(2)}</td>`; }
        else html += `<td${isToday ? ' class="today-col no-data"' : ' class="no-data"'}>—</td>`;
      });
      const avg = cnt > 0 ? Math.round(sum/cnt) : null;
      html += `<td class="avg-col sticky-right">${avg != null ? (Number.isInteger(avg) ? avg : avg.toFixed(2)) : "—"}</td></tr>`;
    });
  });

// ===== MONTHLY STATS ENGINE =====
function computeMonthlyStats(year) {
  const stats = {};
  const allDates = Object.keys(ALL_DATA).filter(d => d.startsWith(String(year))).sort();
  allDates.forEach(ds => {
    const month = ds.substring(5, 7);
    if (!stats[month]) stats[month] = {};
    const prices = ALL_DATA[ds];
    Object.keys(prices).forEach(code => {
      const v = prices[code];
      if (v == null) return;
      if (!stats[month][code]) stats[month][code] = { sum: 0, count: 0, min: Infinity, max: -Infinity };
      stats[month][code].sum += v;
      stats[month][code].count++;
      if (v < stats[month][code].min) stats[month][code].min = v;
      if (v > stats[month][code].max) stats[month][code].max = v;
    });
  });
  // Finalize averages
  Object.keys(stats).forEach(month => {
    Object.keys(stats[month]).forEach(code => {
      const s = stats[month][code];
      s.avg = s.count > 0 ? s.sum / s.count : null;
    });
  });
  return stats;
}

function getAvailableMonths(year) {
  return Object.keys(computeMonthlyStats(year)).sort();
}

// ===== KPI 摘要行 =====
function renderKPIs(year, month) {
  const stats = computeMonthlyStats(year);
  const monthKey = String(month).padStart(2, "0");
  const monthData = stats[monthKey] || {};
  const prevMonthKey = String(month - 1).padStart(2, "0");
  const prevMonthData = stats[prevMonthKey] || {};

  // Latest date with data in this month
  const prefix = `${year}-${monthKey}`;
  const dates = Object.keys(ALL_DATA).filter(d => d.startsWith(prefix)).sort();
  const latestDate = dates.length > 0 ? dates[dates.length - 1] : null;
  const latestData = latestDate ? ALL_DATA[latestDate] : {};
  const varietyCount = Object.keys(latestData).filter(k => latestData[k] != null).length;

  // MoM average across all varieties
  let momChanges = [];
  Object.keys(monthData).forEach(code => {
    if (monthData[code] && monthData[code].avg != null && prevMonthData[code] && prevMonthData[code].avg != null) {
      momChanges.push((monthData[code].avg - prevMonthData[code].avg) / prevMonthData[code].avg * 100);
    }
  });
  const avgMom = momChanges.length > 0 ? momChanges.reduce((a,b) => a+b, 0) / momChanges.length : 0;

// Key varieties
  function fmtChg(cur, prev) {
    if (cur == null || prev == null) return "";
    const chg = (cur - prev) / prev * 100;
    const cls = chg >= 0 ? "kpi-up" : "kpi-down";
    const arrow = chg >= 0 ? "▲" : "▼";
    return `<span class="kpi-change ${cls}">${arrow}${Math.abs(chg).toFixed(1)}%</span>`;
  }

  // 日涨跌：最新日 vs 前一日
  const allSortedDates = dates;
  const latestDateVal = latestDate ? (ALL_DATA[latestDate] || {}) : {};
  const prevDate = allSortedDates.length >= 2 ? allSortedDates[allSortedDates.length - 2] : null;
  const prevDateVal = prevDate ? (ALL_DATA[prevDate] || {}) : {};

  // 最新日价格（用于 KPI 显示）
  const cuLatest = latestDateVal["CU"];
  const alLatest = latestDateVal["A00_AL"];
  const adcLatest = latestDateVal["ADC12"];
  const cuPrevDay = prevDateVal["CU"];
  const alPrevDay = prevDateVal["A00_AL"];
  const adcPrevDay = prevDateVal["ADC12"];

  // 月均价（用于 KPI 副行）
  const cuAvg = monthData["CU"] ? monthData["CU"].avg : null;
  const alAvg = monthData["A00_AL"] ? monthData["A00_AL"].avg : null;
  const adcAvg = monthData["ADC12"] ? monthData["ADC12"].avg : null;
  const cuPrev = prevMonthData["CU"] ? prevMonthData["CU"].avg : null;
  const alPrev = prevMonthData["A00_AL"] ? prevMonthData["A00_AL"].avg : null;
  const adcPrev = prevMonthData["ADC12"] ? prevMonthData["ADC12"].avg : null;

  document.getElementById("kpiRow").innerHTML = `
    <div class="kpi-card accent-al">
      <div class="kpi-label">今日更新品种</div>
      <div class="kpi-value">${varietyCount}<span class="unit">/ 16</span></div>
      <div class="kpi-sub">${latestDate || "暂无数据"}</div>
    </div>
    <div class="kpi-card accent-cu">
      <div class="kpi-label">铜 (CU) · 最新</div>
      <div class="kpi-value">${cuLatest != null ? Math.round(cuLatest).toLocaleString() : "—"}<span class="unit">元/吨</span>${fmtChg(cuLatest, cuPrevDay)}</div>
      <div class="kpi-sub">日涨跌 · 月均${cuAvg ? Math.round(cuAvg).toLocaleString() : "—"}${fmtChg(cuAvg, cuPrev)}</div>
    </div>
    <div class="kpi-card accent-al">
      <div class="kpi-label">A00 铝 · 最新</div>
      <div class="kpi-value">${alLatest != null ? Math.round(alLatest).toLocaleString() : "—"}<span class="unit">元/吨</span>${fmtChg(alLatest, alPrevDay)}</div>
      <div class="kpi-sub">日涨跌 · 月均${alAvg ? Math.round(alAvg).toLocaleString() : "—"}${fmtChg(alAvg, alPrev)}</div>
    </div>
    <div class="kpi-card accent-adc">
      <div class="kpi-label">ADC12 · 最新</div>
      <div class="kpi-value">${adcLatest != null ? Math.round(adcLatest).toLocaleString() : "—"}<span class="unit">元/吨</span>${fmtChg(adcLatest, adcPrevDay)}</div>
      <div class="kpi-sub">日涨跌 · 月均${adcAvg ? Math.round(adcAvg).toLocaleString() : "—"}${fmtChg(adcAvg, adcPrev)}</div>
    </div>
    <div class="kpi-card accent-mom">
      <div class="kpi-label">月均价环比</div>
      <div class="kpi-value ${avgMom >= 0 ? "kpi-up" : "kpi-down"}">${avgMom >= 0 ? "+" : ""}${avgMom.toFixed(1)}<span class="unit">%</span></div>
      <div class="kpi-sub">全品种均值 · 较上月</div>

  `;

// ===== 下月价格预测图 =====
function renderPrediction() {
  const year = parseInt(document.getElementById("yearSelect").value);
  const stats = computeMonthlyStats(year);
  const months = Object.keys(stats).sort();
  const noteEl = document.getElementById("predictionNote");
  if (months.length < 3) { noteEl.innerHTML = "需要至少 3 个月的数据才能进行预测。"; return; }

  const sel = document.getElementById("predVariety");
  const code = sel ? sel.value : "A00_AL";
  const unit = VARIETY_UNITS[code] || DEFAULT_UNIT;
  const monthlyAvgs = months.map(m => { const s = stats[m][code]; return s && s.avg != null ? s.avg : null; });
  if (monthlyAvgs.filter(v => v !== null).length < 3) { noteEl.innerHTML = `${VARIETY_NAMES[code]} 数据不足，无法预测。`; return; }

  const N = months.length;
  const validMonths = months.filter((_, i) => monthlyAvgs[i] != null);
  const validAvgs = monthlyAvgs.filter(v => v !== null);
  const nValid = validAvgs.length;

  // ===== 1. 加权线性回归趋势（近期权重更高）=====
  const x = validAvgs.map((_, i) => i);
  // 指数衰减权重：最近的月份权重最大
  const weights = validAvgs.map((_, i) => Math.pow(0.7, nValid - 1 - i));
  const sumW = weights.reduce((a, b) => a + b, 0);
  const wX = x.reduce((a, xi, i) => a + weights[i] * xi, 0);
  const wY = validAvgs.reduce((a, yi, i) => a + weights[i] * yi, 0);
  const wXY = x.reduce((a, xi, i) => a + weights[i] * xi * validAvgs[i], 0);
  const wX2 = x.reduce((a, xi, i) => a + weights[i] * xi * xi, 0);
  const denom = sumW * wX2 - wX * wX;
  const slope = denom !== 0 ? (sumW * wXY - wX * wY) / denom : 0;
  const intercept = (wY - slope * wX) / sumW;

  // ===== 2. 动量修正（最近2个月的变动率）=====
  const lastAvg = validAvgs[nValid - 1];
  const prevAvg = validAvgs[nValid - 2];
  const momentum = lastAvg && prevAvg ? (lastAvg - prevAvg) / prevAvg : 0; // 正=上涨势头

  // ===== 3. 综合预测值 =====
  // 趋势外推占 70%，动量占 30%
  const trendPred = slope * nValid + intercept;
  const momentumPred = lastAvg * (1 + momentum);
  const predValue = trendPred * 0.7 + momentumPred * 0.3;

  // ===== 4. 自适应置信区间（考虑趋势不确定性）=====
  const residuals = validAvgs.map((yi, i) => yi - (slope * i + intercept));
  const SE = Math.sqrt(residuals.reduce((s, r) => s + r * r, 0) / Math.max(nValid - 2, 1));
  // 预测月份比最后一个数据点远 1 个月，不确定性略增
  const predSE = SE * 1.15;
  const ciLower = predValue - 1.96 * predSE;
  const ciUpper = predValue + 1.96 * predSE;

  // ===== 5. EWMA 平滑线（替代简单3月MA）=====
  const ewmaAlpha = 0.4;
  const ewmaData = [];
  let ewma = validAvgs[0];
  ewmaData.push(ewma);
  for (let i = 1; i < nValid; i++) {
    ewma = ewmaAlpha * validAvgs[i] + (1 - ewmaAlpha) * ewma;
    ewmaData.push(ewma);
  }
  // 外推 EWMA
  const ewmaPred = ewmaAlpha * predValue + (1 - ewmaAlpha) * ewma;

  // ===== 构建图表 =====
  const nextMonthNum = parseInt(months[months.length - 1]) + 1;
  const labels = [...validMonths.map(m => parseInt(m) + "月"), `${nextMonthNum}月(预测)`];
  const nullPad = Array(nValid).fill(null);

  // 趋势线数据
  const trendLine = x.map(i => slope * i + intercept);

  const datasets = [
    // 置信区间（填充区域）
    { label: "95%置信上界", data: [...nullPad, Math.round(ciUpper)], borderColor: "transparent", backgroundColor: "rgba(147,51,234,0.10)", pointRadius: 0, fill: false, type: "line" },
    { label: "95%置信下界", data: [...nullPad, Math.round(ciLower)], borderColor: "transparent", backgroundColor: "rgba(147,51,234,0.10)", pointRadius: 0, fill: "-1", type: "line" },
    // 实际月均价
    { label: "实际月均价", data: [...validAvgs.map(v => Math.round(v)), null], borderColor: "#2563eb", backgroundColor: "transparent", tension: 0.3, pointRadius: 5, pointHoverRadius: 7, borderWidth: 2.5 },
    // 加权趋势线
    { label: "加权趋势", data: [...trendLine.map(v => Math.round(v)), Math.round(trendPred)], borderColor: "#ea580c", backgroundColor: "transparent", borderDash: [6, 3], pointRadius: 0, borderWidth: 1.5, tension: 0 },
    // EWMA 平滑
    { label: "EWMA平滑", data: [...ewmaData.map(v => Math.round(v)), Math.round(ewmaPred)], borderColor: "#16a34a", backgroundColor: "transparent", borderDash: [3, 3], pointRadius: 2, borderWidth: 1.5, tension: 0.3 },
    // 预测值（大菱形）
    { label: `预测: ${Math.round(predValue).toLocaleString()}`, data: [...nullPad, Math.round(predValue)], borderColor: "#9333ea", backgroundColor: "#9333ea", pointRadius: 8, pointHoverRadius: 10, pointStyle: "rectRot", showLine: false },
  ];

  if (window._predChart) window._predChart.destroy();
  window._predChart = new Chart(document.getElementById("predictionChart"), {
    type: "line", data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        tooltip: { mode: "index", intersect: false },
        legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 10 } } }
      },
      scales: {
        x: { title: { display: true, text: "月份" } },
        y: { title: { display: true, text: "价格 (" + unit + ")" }, beginAtZero: false }
      }
    }
  });

  // ===== 预测摘要 =====
  const trendDir = slope > 0 ? "上涨" : slope < 0 ? "下跌" : "持平";
  const trendRate = lastAvg ? Math.abs(slope / lastAvg * 100).toFixed(2) : "0.00";
  const momDir = momentum > 0.005 ? "加速" : momentum < -0.005 ? "减速" : "平稳";
  const ciWidth = predValue ? ((ciUpper - ciLower) / predValue * 100).toFixed(1) : "0";
  const vsLastMonth = lastAvg ? ((predValue - lastAvg) / lastAvg * 100).toFixed(1) : "0";
  const vsArrow = parseFloat(vsLastMonth) >= 0 ? "▲" : "▼";

  noteEl.innerHTML =
    `<strong>${VARIETY_NAMES[code]}</strong> ${nextMonthNum}月预测: <strong style="color:#9333ea">${Math.round(predValue).toLocaleString()} ${unit}</strong> ${vsArrow}${Math.abs(vsLastMonth)}% 较本月<br>` +
    `趋势: ${trendDir} (月均${trendRate}%) | 动量: ${momDir} | 置信区间: ${Math.round(ciLower).toLocaleString()} ~ ${Math.round(ciUpper).toLocaleString()} (带宽${ciWidth}%)<br>` +
    `<span style="font-size:10px;color:#94a3b8">模型: 加权趋势(70%) + 动量修正(30%) + EWMA平滑 | 基于${nValid}个月数据</span>`;
}

// ===== HELPERS =====
function getMonthDays(year, month) {
  const days = [];
  const d = new Date(year, month-1, 1);
  while(d.getMonth() === month-1) { days.push(new Date(d)); d.setDate(d.getDate()+1); }
  return days;
}

function formatDateLocal(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function destroyCharts() {

}

  "2026-01-01","2026-01-02","2026-01-03", // 元旦
  "2026-01-28","2026-01-29","2026-01-30","2026-01-31",

  "2026-06-19","2026-06-20","2026-06-21", // 端午
  "2026-10-01","2026-10-02","2026-10-03","2026-10-04",
  "2026-10-05","2026-10-06","2026-10-07","2026-10-08", // 中秋+国庆
]);

function isWorkingDay(d) {
  const ds = formatDateLocal(d);
  // 节假日
  if (HOLIDAYS_2026.has(ds)) return false;
  // 周末（0=周日, 6=周六）
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  return true;
}

  initNewDropdowns();
  const sel = getSelected();
  renderAll(sel.year, sel.month);
});

// ===== 导出功能 =====
function toggleExportMenu(e) {
  e.stopPropagation();
  document.getElementById('exportMenu').classList.toggle('open');
}
function closeExportMenu() {
  document.getElementById('exportMenu').classList.remove('open');
}
document.addEventListener('click', closeExportMenu);

function _getExportData() {
  const y = parseInt(document.getElementById("yearSelect").value);
  const m = parseInt(document.getElementById("monthSelect").value);
  const prefix = `${y}-${String(m).padStart(2,"0")}`;
  const allCodes = CATEGORIES.flatMap(c => c.codes);
  const dates = Object.keys(ALL_DATA).filter(d => d.startsWith(prefix)).sort();
  const monthLabel = `${y}年${m}月`;
  return { y, m, prefix, allCodes, dates, monthLabel };
}

function exportExcel() {
  const { allCodes, dates, monthLabel } = _getExportData();
  // CSV 格式（Excel 可直接打开），带 BOM 支持 Excel 正确识别 UTF-8
  let csv = '\uFEFF品种,单位,' + dates.join(',') + '\n';
  CATEGORIES.forEach(cat => {
    cat.codes.forEach(code => {
      const name = VARIETY_NAMES[code];
      const unit = VARIETY_UNITS[code] || DEFAULT_UNIT;
      const vals = dates.map(d => {
        const v = ALL_DATA[d] && ALL_DATA[d][code];
        return v != null ? v : '';
      });
      csv += name + ',' + unit + ',' + vals.join(',') + '\n';
    });
  });
  _download(csv, `有色金属价格_${monthLabel}.csv`, 'text/csv;charset=utf-8');
}

function exportMarkdown() {
  const { allCodes, dates, monthLabel } = _getExportData();
  let md = `# 有色金属价格 ${monthLabel}\n\n`;
  md += `| 品种 | 单位 | ` + dates.map(d => d.substring(5)).join(' | ') + ' |\n';
  md += '| --- | --- | ' + dates.map(() => '---').join(' | ') + ' |\n';
  CATEGORIES.forEach(cat => {
    md += `| **${cat.name}** | | |\n`;
    cat.codes.forEach(code => {
      const unit = VARIETY_UNITS[code] || DEFAULT_UNIT;
      const vals = dates.map(d => {
        const v = ALL_DATA[d] && ALL_DATA[d][code];
        return v != null ? (Number.isInteger(v) ? v : v.toFixed(2)) : '—';
      });
      md += `| ${VARIETY_NAMES[code]} | ${unit} | ` + vals.join(' | ') + ' |\n';
    });
  });
  _download(md, `有色金属价格_${monthLabel}.md`, 'text/markdown;charset=utf-8');
}

function exportPDF() {
  // 利用 window.print() + @media print 样式，简洁可靠
  // 浏览器原生导出 PDF，无需第三方库
  window.print();
}

function _download(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
